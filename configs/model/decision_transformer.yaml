name: DecisionTransformer
d_model: 128
n_head: 4
n_layer: 4
max_len: 100
dropout: 0.1

training:
  epochs: 50
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 0.01
  grad_clip: 1.0

params:
  mdl_spatial_prior: false
  mdl_init_embedding_freeze: false
  mdl_init_embedding_train: false
  mdl_attn_sim_bias: false
